name: Church Tests

on:
  pull_request_target:
    branches:
      - "church-task-first"
      - "church-task-analyzer"
      - "church-task-optimizer"
      - "church-task-causal"
      - "church-task-claster"
      - "church-task-parser"
      

permissions:
  contents: read
  pull-requests: write

jobs:
  hidden-tests:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Prepare run artifacts directory
        id: paths
        run: |
          artifacts_dir="${{ runner.temp }}/church-tests-${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$artifacts_dir"
          echo "artifacts_dir=$artifacts_dir" >> "$GITHUB_OUTPUT"
          echo "team_dir_file=$artifacts_dir/team-dir.txt" >> "$GITHUB_OUTPUT"
          echo "public_summary=$artifacts_dir/public-summary.json" >> "$GITHUB_OUTPUT"
          echo "hidden_summary=$artifacts_dir/hidden-summary.json" >> "$GITHUB_OUTPUT"
          echo "score_markdown=$artifacts_dir/score.md" >> "$GITHUB_OUTPUT"
          echo "score_json=$artifacts_dir/score.json" >> "$GITHUB_OUTPUT"

      - name: Checkout trusted base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: trusted

      - name: Checkout PR head into isolated directory
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate

      - name: Checkout private hidden tests
        uses: actions/checkout@v4
        with:
          repository: babadzakich/silver-octo-telegram
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.PRIVATE_TESTS_TOKEN }}
          path: private-tests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect submitted solution
        id: detect
        working-directory: trusted
        run: |
          python3 ci/select_submission.py \
            --task-dir . \
            --candidate-root ../candidate \
            --baseline-root . > "${{ steps.paths.outputs.team_dir_file }}"
          echo "submission_dir=$(cat "${{ steps.paths.outputs.team_dir_file }}")" >> "$GITHUB_OUTPUT"
          team_dir="$(cat "${{ steps.paths.outputs.team_dir_file }}")"
          echo "team=$(basename "$team_dir")" >> "$GITHUB_OUTPUT"
          echo "team_hash_file=$team_dir/team.hash" >> "$GITHUB_OUTPUT"

      - name: Run public tests for score
        id: public_score
        continue-on-error: true
        working-directory: trusted
        run: |
          python3 ci/run_task_tests.py \
            --task-dir . \
            --submission-dir "${{ steps.detect.outputs.submission_dir }}" \
            --tests-dir ../private-tests/tests/visible \
            --answers-dir ../private-tests/tests/visible \
            --visibility public \
            --json-output "${{ steps.paths.outputs.public_summary }}" \
            --timeout-sec 3 \
            --build-timeout-sec 30 \
            --sandbox-backend bwrap \
            --require-sandbox \
            --memory-limit-mb 512

      - name: Run hidden tests against canonical reference output
        id: hidden_score
        continue-on-error: true
        working-directory: trusted
        run: |
          python3 ci/run_task_tests.py \
            --task-dir . \
            --submission-dir "${{ steps.detect.outputs.submission_dir }}" \
            --tests-dir ../private-tests/tests/hidden \
            --answers-dir ../private-tests/tests/hidden \
            --visibility hidden \
            --json-output "${{ steps.paths.outputs.hidden_summary }}" \
            --timeout-sec 8 \
            --build-timeout-sec 30 \
            --sandbox-backend bwrap \
            --require-sandbox \
            --memory-limit-mb 512

      - name: Prepare fallback score inputs
        if: always()
        working-directory: trusted
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          task_config = json.loads(Path("task.json").read_text(encoding="utf-8"))
          scoring = task_config.get("scoring", {})

          def ensure_summary(path, visibility, reason):
              p = Path(path)
              if p.exists():
                  return
              group = scoring.get(visibility, {})
              payload = {
                  "task": task_config.get("name", "task"),
                  "group_name": group.get("label", visibility.capitalize()),
                  "visibility": visibility,
                  "test_weight": group.get("weight_per_test", 0),
                  "total_tests": 0,
                  "passed_tests": 0,
                  "failed_tests": 0,
                  "points_awarded": 0,
                  "points_total": 0,
                  "passed_test_names": [],
                  "failed_test_names": [reason] if reason else [],
                  "total_time_sec": 0.0,
                  "success": False,
              }
              p.write_text(json.dumps(payload, ensure_ascii=True, indent=2) + "\n", encoding="utf-8")

          ensure_summary(
              "${{ steps.paths.outputs.public_summary }}",
              "public",
              "public score step did not produce a summary",
          )
          ensure_summary(
              "${{ steps.paths.outputs.hidden_summary }}",
              "hidden",
              "hidden score step did not produce a summary",
          )
          PY

      - name: Build score report
        if: always()
        working-directory: trusted
        run: |
          python3 ci/build_score_report.py \
            --task-config task.json \
            --public-summary "${{ steps.paths.outputs.public_summary }}" \
            --hidden-summary "${{ steps.paths.outputs.hidden_summary }}" \
            --markdown-output "${{ steps.paths.outputs.score_markdown }}" \
            --json-output "${{ steps.paths.outputs.score_json }}"

      - name: Publish score to pipeline API
        if: always() && steps.detect.outcome == 'success'
        working-directory: trusted
        env:
          PIPELINE_API_BASE_URL: ${{ secrets.PIPELINE_API_BASE_URL }}
          PIPELINE_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          python3 ci/publish_pipeline_score.py \
            --task-config task.json \
            --score-json "${{ steps.paths.outputs.score_json }}" \
            --team-name "${{ steps.detect.outputs.team }}" \
            --team-hash-file "${{ steps.detect.outputs.team_hash_file }}" \
            --api-base-url "$PIPELINE_API_BASE_URL"

      - name: Comment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('${{ steps.paths.outputs.score_markdown }}')
              ? fs.readFileSync('${{ steps.paths.outputs.score_markdown }}', 'utf8')
              : '## Hakaton Score\n\nScore report could not be built.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })

      - name: Fail workflow if any suite failed
        if: always()
        run: |
          if [ "${{ steps.public_score.outcome }}" != "success" ] || [ "${{ steps.hidden_score.outcome }}" != "success" ]; then
            exit 1
          fi
